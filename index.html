<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News Live - Real-Time Updates</title>
    <meta name="description" content="Real-time news from around the world in every category. Refresh for latest updates.">
    <style>
        :root {
            --primary: #4361ee;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray: #6c757d;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            color: #333;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, var(--primary), #3f37c9);
            color: white;
            text-align: center;
            padding: 3rem 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        header h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        header p { font-size: 1.3rem; opacity: 0.9; }

        .container { max-width: 1300px; margin: 2rem auto; padding: 0 1rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.8rem;
        }
        .category-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 35px rgba(0,0,0,0.15);
        }
        .category-header {
            background: var(--primary);
            color: white;
            padding: 1rem;
            font-size: 1.4rem;
            font-weight: 600;
            text-align: center;
        }
        .articles {
            padding: 1rem;
        }
        .article {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .article:last-child { border-bottom: none; }
        .article img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .article-content h3 {
            font-size: 1rem;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .article-content h3 a {
            color: var(--dark);
            text-decoration: none;
        }
        .article-content h3 a:hover { color: var(--primary); }
        .article-content p {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 4px;
        }
        .source {
            font-size: 0.75rem;
            color: #999;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--gray);
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        footer {
            text-align: center;
            padding: 2rem;
            background: var(--dark);
            color: white;
            margin-top: 3rem;
        }
        @media (max-width: 600px) {
            header h1 { font-size: 2.2rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Global News Live</h1>
    <p>Real-time headlines from every category • Refresh for instant updates</p>
</header>

<div class="container">
    <div id="loading" class="loading">Fetching the latest news from around the world...</div>
    <div id="error" class="error" style="display:none;"></div>
    <div id="news-grid" class="grid" style="display:none;"></div>
</div>

<footer>
    <p>Powered by NewsAPI • Updated every refresh • © 2025 Global News Live</p>
</footer>

<script>
    const API_KEY = 'd0b4ae7d89214b83a7e0453efd05ba17';
    const BASE_URL = 'https://newsapi.org/v2/top-headlines';
    
    const categories = [
        { name: 'General',     category: 'general' },
        { name: 'Business',    category: 'business' },
        { name: 'Entertainment', category: 'entertainment' },
        { name: 'Health',      category: 'health' },
        { name: 'Science',     category: 'science' },
        { name: 'Sports',      category: 'sports' },
        { name: 'Technology',  category: 'technology' }
    ];

    async function fetchCategory(category) {
        const url = `${BASE_URL}?country=us&category=${category}&pageSize=10&apiKey=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        return data.articles || [];
    }

    function createArticleHTML(article) {
        const img = article.urlToImage || `https://via.placeholder.com/90x90/4361ee/ffffff?text=${encodeURIComponent(article.source.name[0])}`;
        const title = article.title || 'No title';
        const desc = article.description || 'Click to read more...';
        const source = article.source.name;
        const date = new Date(article.publishedAt).toLocaleDateString();
        
        return `
            <div class="article">
                <img src="${img}" alt="News image" loading="lazy">
                <div class="article-content">
                    <h3><a href="${article.url}" target="_blank" rel="noopener">${title}</a></h3>
                    <p>${desc}</p>
                    <div class="source">${source} • ${date}</div>
                </div>
            </div>
        `;
    }

    async function loadAllNews() {
        const grid = document.getElementById('news-grid');
        const loading = document.getElementById('loading');
        const error = document

.getElementById('error');

        try {
            let html = '';
            for (const cat of categories) {
                const articles = await fetchCategory(cat.category);
                html += `
                    <div class="category-card">
                        <div class="category-header">${cat.name}</div>
                        <div class="articles">
                            ${articles.slice(0, 10).map(createArticleHTML).join('')}
                        </div>
                    </div>
                `;
            }
            grid.innerHTML = html;
            grid.style.display = 'grid';
            loading.style.display = 'none';
        } catch (err) {
            console.error(err);
            error.textContent = 'Failed to load news. Please try refreshing the page.';
            error.style.display = 'block';
            loading.style.display = 'none';
        }
    }

    // Load news on page load
    loadAllNews();

    // Optional: Auto-refresh every 15 minutes
    setInterval(() => location.reload(), 15 * 60 * 1000);
</script>

</body>
</html>
