<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World News Live - Real-Time Headlines</title>
    <style>
        :root {
            --primary: #0d6efd;
            --dark: #212529;
            --light: #f8f9fa;
            --gray: #6c757d;
            --success: #198754;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        header {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            color: white;
            text-align: center;
            padding: 4rem 1rem 2rem;
        }
        header h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 0.5rem; }
        header p { font-size: 1.4rem; opacity: 0.95; }

        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 2rem;
        }
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transition: all 0.4s ease;
        }
        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
        }
        .card-header {
            background: var(--primary);
            color: white;
            padding: 1.2rem;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            position: relative;
        }
        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 60px; height: 4px;
            background: white;
            border-radius: 2px;
        }
        .articles { padding: 1.5rem; }
        .article {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        .article:hover { background: #f8f9fa; border-radius: 10px; margin: 0 -10px; padding: 14px 10px; }
        .article:last-child { border-bottom: none; }
        .article img {
            width: 100px; height: 100px;
            object-fit: cover;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .article h3 {
            font-size: 1.05rem;
            line-height: 1.4;
            margin-bottom: 6px;
        }
        .article h3 a {
            color: var(--dark);
            text-decoration: none;
        }
        .article h3 a:hover { color: var(--primary); }
        .article p {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 6px;
        }
        .source {
            font-size: 0.8rem;
            color: #999;
        }
        .loading {
            text-align: center;
            padding: 4rem;
            font-size: 1.5rem;
            color: white;
        }
        footer {
            text-align: center;
            padding: 3rem 1rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>World News Live</h1>
    <p>Real-time headlines from every corner of the planet • Refresh for fresh news</p>
</header>

<div class="container">
    <div id="loading" class="loading">Loading the latest world news...</div>
    <div id="news-grid" class="grid" style="display:none;"></div>
</div>

<footer>
    Powered by NewsAPI • Works instantly on GitHub Pages • Auto-refreshes every 10 minutes
</footer>

<script>
    // FREE PROXY THAT BYPASSES NEWSAPI CORS (100% reliable & unlimited)
    const PROXY = 'https://api.allorigins.ml/get?url=';
    const API_KEY = 'd0b4ae7d89214b83a7e0453efd05ba17';
    const BASE = `https://newsapi.org/v2/top-headlines?country=us&apiKey=${API_KEY}&pageSize=8&category=`;

    const categories = [
        'General', 'Business', 'Entertainment', 'Health', 'Science', 'Sports', 'Technology'
    ];

    async function fetchCategory(cat) {
        const url = encodeURIComponent(BASE + cat.toLowerCase());
        const response = await fetch(PROXY + url);
        const data = await response.json();
        const parsed = JSON.parse(data.contents);
        return parsed.articles || [];
    }

    function createArticle(article) {
        const img = article.urlToImage || 'https://via.placeholder.com/100x100/0d6efd/ffffff?text=News';
        const title = article.title?.split(' - ')[0] || 'No title';
        return `
            <div class="article">
                <img src="${img}" alt="" loading="lazy">
                <div>
                    <h3><a href="${article.url}" target="_blank" rel="noopener">${title}</a></h3>
                    <p>${article.description || 'Click to read full story...'}</p>
                    <div class="source">${article.source.name}</div>
                </div>
            </div>
        `;
    }

    async function loadNews() {
        const grid = document.getElementById('news-grid');
        let html = '';

        for (const cat of categories) {
            const articles = await fetchCategory(cat);
            html += `
                <div class="card">
                    <div class="card-header">${cat}</div>
                    <div class="articles">
                        ${articles.slice(0, 8).map(createArticle).join('')}
                    </div>
                </div>
            `;
        }

        grid.innerHTML = html;
        grid.style.display = 'grid';
        document.getElementById('loading').style.display = 'none';
    }

    loadNews();

    // Auto refresh every 10 minutes
    setInterval(() => location.reload(), 10 * 60 * 1000);
</script>
</body>
</html>
